version: '3.8'

services:
  # PostgreSQL Database (with backups)
  db:
    image: postgres:15-alpine
    container_name: emailcampaign_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emailcampaign_prod_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: emailcampaign_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emailcampaign_prod_network

  # API Server (multiple instances for load balancing)
  api:
    image: emailcampaign-api:latest
    container_name: emailcampaign_api_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      CORS_ALLOW_ORIGINS: ${CORS_ORIGINS}
      WORKERS: 4
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - emailcampaign_prod_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: emailcampaign_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./emailcampaigntracker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./emailcampaigntracker/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - emailcampaign_prod_network

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  emailcampaign_prod_network:
    driver: bridge

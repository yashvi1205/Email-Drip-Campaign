name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: emailcampaigntracker
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appuser -d emailcampaigntracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/emailcampaigntracker
      CORS_ALLOW_ORIGINS: http://localhost:3000
      API_KEY: test-api-key
      DASHBOARD_API_KEY: test-api-key
      SCRAPER_API_KEY: test-api-key
      JWT_SECRET_KEY: test-jwt-secret
      JWT_REFRESH_SECRET_KEY: test-jwt-refresh-secret
      AUTH_USERS_JSON: >-
        [{"username":"admin","password":"admin123","role":"admin"},{"username":"scraper","password":"scraper123","role":"scraper"},{"username":"dashboard","password":"dashboard123","role":"dashboard"}]
      TRACKING_SIGNING_SECRET: test-tracking-signing-secret
      REQUIRE_SIGNED_TRACKING: "false"
      REDIS_URL: redis://localhost:6379/0
      SCRAPER_QUEUE_NAME: scraper
      SCRAPER_JOB_TIMEOUT_SECONDS: "300"
      SCRAPER_JOB_MAX_ATTEMPTS: "2"
      SCRAPER_JOB_RETRY_INTERVAL_SECONDS: "5"
      SCRAPER_CANCEL_POLL_SECONDS: "1"
      SCRAPER_RUN_LOCK_TTL_SECONDS: "60"
      SCRAPER_MAX_RUNNING_AGE_SECONDS: "120"
      OTEL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate migrations
        run: alembic upgrade head
      - name: Backend lint (syntax/compile)
        run: python -m compileall app database
      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build


version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: emailcampaign_db
    environment:
      POSTGRES_USER: emailcampaign
      POSTGRES_PASSWORD: emailcampaign_dev_pass
      POSTGRES_DB: emailcampaign
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U emailcampaign" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emailcampaign_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: emailcampaign_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emailcampaign_network

  # API Server
  api:
    build: .
    container_name: emailcampaign_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:121205@host.docker.internal:5432/drip_campaign
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://localhost:3000
      BACKEND_INTERNAL_URL: http://api:8000
      API_KEY: admin-key-123
      DASHBOARD_API_KEY: dashboard-key-456
      SCRAPER_API_KEY: scraper-key-789
      AUTH_USERS_JSON: '[{"username":"admin","password":"admin123","role":"admin"},{"username":"scraper","password":"scraper123","role":"scraper"},{"username":"dashboard","password":"dashboard123","role":"dashboard"}]'
      JWT_SECRET_KEY: dev-jwt-secret
      JWT_REFRESH_SECRET_KEY: dev-jwt-refresh-secret
      TRACKING_SIGNING_SECRET: dev-tracking-signing-secret
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./alembic:/app/alembic
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - emailcampaign_network

  # Scraper Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: emailcampaign_worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:121205@host.docker.internal:5432/drip_campaign
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      HEADLESS: "true"
      CHROME_BIN: /usr/bin/chromium
      BACKEND_INTERNAL_URL: http://api:8000
      CHROME_PROFILE_BASE_PATH: /app/data/browser/Default
      API_KEY: admin-key-123
      SCRAPER_API_KEY: scraper-key-789
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
    volumes:
      - .:/app
      - /c/selenium-profile:/app/data/browser
    networks:
      - emailcampaign_network

  # Frontend (optional, for full-stack testing)
  frontend:
    image: node:20-alpine
    container_name: emailcampaign_frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - api
    networks:
      - emailcampaign_network

volumes:
  postgres_data:
    driver: local

networks:
  emailcampaign_network:
    driver: bridge
